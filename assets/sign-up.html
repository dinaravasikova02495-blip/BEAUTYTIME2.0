<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Beauty Time — Запись на услуги</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">


</head>

<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="../index.html" class="logo">BEAUTY <span>TIME</span></a>
            <div class="right-icons">
                <a href="profile.html" class="profile-icon"><i class="fas fa-user-circle"></i></a>
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="menu-icon"><i class="fas fa-bars"></i></label>
                <label for="menu-toggle" class="menu-overlay"></label>
                <div class="nav-links">
                    <label for="menu-toggle" class="close-menu"><i class="fas fa-times"></i></label>
                    <a href="../index.html"><i class="fas fa-home"></i> Главная</a>
                    <a href="about.html"><i class="fas fa-spa"></i> О нас</a>
                    <div class="dropdown" id="services-dropdown">
                        <div class="dropdown-header" onclick="toggleDropdown(event)">
                            <span><i class="fas fa-cut"></i> Услуги</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="dropdown-content">
                            <a href="services-hair.html">Парикмахерские услуги</a>
                            <a href="services-lashes.html">Ресницы</a>
                            <a href="services-makeup.html">Make up</a>
                            <a href="services-brows.html">Уход за бровями</a>
                            <a href="services-nails.html">Ногтевой сервис</a>
                        </div>
                    </div>
                    <a href="reviews.html"><i class="fas fa-star"></i> Отзывы</a>
                    <a href="contacts.html"><i class="fas fa-phone-alt"></i> Контакты</a>

                </div>
            </div>
        </div>
    </nav>

    <div class="booking-page">
        <div class="booking-container">
            <div class="services-section">
                <h2>Выберите услуги</h2>
                <div id="services-container"></div>
                <div id="category-warning" class="category-warning"></div>
            </div>
            <div class="cart-section" id="cart-section">
                <h3><i class="fas fa-shopping-cart"></i> Корзина</h3>
                <div id="cart-items" class="cart-items">
                    <div class="empty-cart">Корзина пуста</div>
                </div>
                <div class="cart-total"><span>Итого:</span><span id="total-price">0 ₽</span></div>
                <div><label><i class="fas fa-user"></i> Мастер</label>
                    <div id="masters-container" class="masters-grid"></div>
                </div>
                <div class="calendar-container">
                    <div class="calendar-header"><span id="current-month"></span>
                        <div class="calendar-nav"><button onclick="changeMonth(-1)"><i
                                    class="fas fa-chevron-left"></i></button><button onclick="changeMonth(1)"><i
                                    class="fas fa-chevron-right"></i></button></div>
                    </div>
                    <div class="calendar-weekdays" id="calendar-weekdays"></div>
                    <div class="calendar-days" id="calendar-days"></div>
                </div>
                <div><label><i class="fas fa-clock"></i> Время</label>
                    <div id="time-slots" class="time-slots"></div>
                </div>
                <button id="booking-btn" class="booking-btn" onclick="confirmBooking()" disabled>Записаться</button>
            </div>
        </div>
    </div>

    <div class="cart-fab" id="cart-fab"
        onclick="document.getElementById('cart-section').scrollIntoView({ behavior: 'smooth' })">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-badge" class="cart-badge cart-badge-hidden">0</span>
    </div>
    <footer>
        <div class="footer-container">
            <div class="footer-content">
                <div class="footer-logo">BEAUTY <span>TIME</span></div>
                <div class="footer-links"><a href="../index.html">Главная</a><a href="about.html">О нас</a><a
                        href="reviews.html">Отзывы</a><a href="contacts.html">Контакты</a></div>
                <div class="footer-social"><a href="#"><i class="fab fa-instagram"></i></a><a href="#"><i
                            class="fab fa-vk"></i></a><a href="#"><i class="fab fa-whatsapp"></i></a></div>
            </div>
            <div class="footer-copyright">© 2026 Beauty Time — студия красоты в Альметьевске</div>
        </div>
    </footer>
    <div class="scroll-top-btn" id="scrollTopBtn">
        <i class="fas fa-arrow-up"></i>
    </div>
    <script src="./script.js"></script>
</body>

</html>
